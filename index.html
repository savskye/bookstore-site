<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Local Shelf</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

        <header class="site-header">
            <nav class="wrap">
                <a href="#top" class="brand">The Local Shelf</a>
                <div class="nav-links">
                    <a href="#catalog">Catalog</a>
                    <a href="#about">About</a>
                </div>
            </nav>
        </header>

        <main id="top">

            <section class="hero">
                <div class="wrap">
                    <h1>Find your next favorite bookstore.</h1>
                    <p>Independent bookstores in your area, filled by community and genre.</p>
                </div>
            </section>

            <section class="catalog-controls" id="catalog">
                <div class="wrap">
                    <div class="tab-row">
                        <button class="tab active" data-filter="all">ALL</button>
                        <button class="tab" data-filter="general">GENERAL</button>
                        <button class="tab" data-filter="used">USED &amp; RARE</button>
                        <button class="tab" data-filter="childrens">CHILDREN'S</button>
                        <button class="tab" data-filter="specialty">SPECIALTY</button>
                    </div>
                </div>
            </section>

            <section class="catalog-grid-section">
                <div class="wrap">
                    <div class="catalog-grid" id="catalogGrid">
                        <!-- Bookstore cards here (add js) -->
                    </div>
                    <p class="empty-state" id="emptyState" hidden>No cards match that search.</p>
                </div>
            </section>

        </main>

        <footer class="site-footer">
            <div class="wrap">
                <p>&copy; 2026 The Local Shelf.</p>
            </div>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
